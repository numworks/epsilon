name: Device build
on:
  workflow_dispatch:
    inputs:
      beta:
        type: boolean
        default: false

env:
  MAKEFLAGS: ${{ vars.MAKEFLAGS }}
  BETA: ${{ fromJSON(github.event.inputs.beta) && '.beta' || ''  }}

jobs:
  build:
    runs-on: ${{ fromJSON(vars.EPSILON_RUNNER_LABELS) }}
    steps:
      - name: Download toolchain
        uses: numworks/setup-arm-toolchain@latest
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build container and define DOCKER_RUN
        uses: ./.github/actions/docker-builder
        with:
          platform: device
      # Not using matrix strategy to avoid multiplying setups and uploads.
      - name: Build n0110
        run: $DOCKER_RUN "make PLATFORM=n0110 epsilon_userland.A.onboarding$BETA.dfu epsilon_userland.A.onboarding$BETA.allow3rdparty.dfu"
      - name: Build n0115
        run: $DOCKER_RUN "make PLATFORM=n0115 epsilon_userland.A.onboarding$BETA.dfu epsilon_userland.A.onboarding$BETA.allow3rdparty.dfu"
      - name: Build n0120
        run: $DOCKER_RUN "make PLATFORM=n0120 epsilon_userland.A.onboarding$BETA.dfu epsilon_userland.A.onboarding$BETA.allow3rdparty.dfu"
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-device-builds
          path: epsilon/output/release/*/epsilon*dfu
          retention-days: 3
