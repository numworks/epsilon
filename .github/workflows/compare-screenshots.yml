name: Screenshots
on:
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'poincare/doc/**'
      - 'shared/ion/src/device/**'
      - '**/scandium/**'
      - 'epsilon/external_apps/**'

env:
  MAKEFLAGS: ${{ vars.MAKEFLAGS_CACHED }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compare_crc:
    timeout-minutes: 15
    runs-on: ${{ fromJSON(vars.EPSILON_CACHED_RUNNER_LABELS) }}
    steps:
      - name: Checkout PR's merged head
        uses: actions/checkout@v4
      - name: Build container and define DOCKER_RUN
        uses: ./.github/actions/docker-builder
      - name: Build PR head
        run: $DOCKER_RUN "make -C epsilon TOOLCHAIN=host-clang PLATFORM=simulator ASSERTIONS=1 epsilon.bin epsilon.cas.bin"
      - name: Compare crc of screenshots (No CAS)
        timeout-minutes: 15
        run: $DOCKER_RUN "\$PYTHON tools/screenshots/compare_crc.py epsilon/output/debug/optimized/linux/epsilon.bin -d epsilon/tests/screenshots_dataset -n"
      - name: Compare crc of screenshots (CAS)
        timeout-minutes: 15
        run: $DOCKER_RUN "\$PYTHON tools/screenshots/compare_crc.py -d epsilon/tests/screenshots_dataset_cas epsilon/output/debug/optimized/linux/epsilon.cas.bin -n"
